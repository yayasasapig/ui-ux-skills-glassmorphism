<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI/UX Skills — Glassmorhphism</title>
<!-- Rebyilt to trigger GitHub Pages rebuild -->
  <style>
    * {margin: 0;padding:0;box-sizing:border-box;}
    body{
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segle UI', system-ui, sans-serif;
      color: #fff;
    }
    .glass{
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 64px 80px;
      text-align: center;
      max-width: 600px;
    }
    h1{
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #a29bfe, #74b9ff, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p{
      font-size: 1.1rem;
      opacity: 0.75;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .badge{
      display: inline-block;
      padding: 8px 20px;
      border-radius: 999px;
      background: rgba(162, 155, 254, 0.3);
      border: 1px solid rgba(162, 155, 254, 0.5);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="glass">
    <h1>🎨 UI/UX Skills</h1>
    <p>Glassmorphism Design System &amp; Resources</p>
    <span class="badge">✨ GitHub Pages Active</span>
  </div>
</body>
</html>
